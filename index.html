<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoteIt – Bachelor in Garden</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --cream: #faf6e9;
            --cream-dark: #f0e8cc;
            --blue: #1a3a6e;
            --blue-mid: #2d5fa0;
            --blue-light: #7a9fd4;
            --blue-pale: #c8d8ee;
            --accent-orange: #e8883a;
            --accent-pink: #e0607a;
            --accent-green: #4a7c59;
        }

        body {
            background: var(--cream);
            color: var(--blue);
            font-family: 'Cormorant Garamond', serif;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, var(--blue), var(--blue-mid));
            color: white;
            padding: 3rem 1rem;
            text-align: center;
            border-bottom: 5px solid var(--accent-orange);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .upload-section {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 3rem;
            border: 1px solid var(--cream-dark);
        }

        .post-card {
            background: white;
            margin-bottom: 2rem;
            border-radius: 4px;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.05);
            padding: 1.5rem;
            border-left: 8px solid var(--blue-light);
            position: relative;
        }

        .post-card img, .post-card video {
            width: 100%;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        .btn-vote {
            background: var(--accent-orange);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-vote:hover { transform: scale(1.05); }

        .action-btn {
            background: none;
            border: 1px solid var(--blue-pale);
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-size: 0.9rem;
            margin-right: 0.5rem;
            cursor: pointer;
        }

        .btn-delete { color: var(--accent-pink); border-color: var(--accent-pink); }
    </style>
</head>
<body>

    <header>
        <h1>VoteIt</h1>
        <p>Bachelor in Garden – Season 2026</p>
    </header>

    <div class="container">
        <div class="upload-section">
            <h3>Neuen Moment teilen</h3>
            <input type="text" id="caption" placeholder="Beschreibung..." style="width: 100%; padding: 0.5rem; margin: 1rem 0;">
            <input type="file" id="mediaFile" accept="image/*,video/*" style="margin-bottom: 1rem;">
            <button onclick="upload()" class="btn-vote" style="width: 100%;">Posten</button>
        </div>

        <div id="timeline"></div>
    </div>

    <script>
        function loadTimeline() {
            fetch('/main').then(res => res.json()).then(posts => {
                const tl = document.getElementById('timeline');
                tl.innerHTML = '';
                posts.forEach(post => {
                    const div = document.createElement('div');
                    div.className = 'post-card';
                    
                    let mediaHtml = '';
                    if (post.imagePath) {
                        if (post.imagePath.endsWith('.mp4')) {
                            mediaHtml = `<video controls src="${post.imagePath}"></video>`;
                        } else {
                            mediaHtml = `<img src="${post.imagePath}" alt="Post Image">`;
                        }
                    }

                    div.innerHTML = `
                        ${mediaHtml}
                        <h2 style="font-family: 'Playfair Display'">${post.caption}</h2>
                        <div style="margin-top: 1rem; display: flex; align-items: center; justify-content: space-between;">
                            <div>
                                <button class="btn-vote" onclick="doLike(${post.id})">
                                    <i class="bi bi-heart-fill"></i> ${post.likes}
                                </button>
                                <button class="action-btn" onclick="doEdit(${post.id})">Bearbeiten</button>
                                <button class="action-btn btn-delete" onclick="doDelete(${post.id})">Löschen</button>
                            </div>
                            <small class="post-date" style="color: #999;">${post.date}</small>
                        </div>
                    `;
                    tl.appendChild(div);
                });
            });
        }

        function upload() {
            const formData = new FormData();
            formData.append("caption", document.getElementById("caption").value);
            const file = document.getElementById("mediaFile").files[0];
            if (file) formData.append("file", file);
            
            fetch('/main', { method: 'POST', body: formData }).then(() => {
                document.getElementById("caption").value = '';
                document.getElementById("mediaFile").value = '';
                loadTimeline();
            });
        }

        function doEdit(id) {
            const newCap = prompt("Neue Beschreibung eingeben:");
            if (newCap) fetch(`/update?id=${id}`, { method: 'POST', body: newCap }).then(() => loadTimeline());
        }

        function doLike(id) { fetch(`/like?id=${id}`, { method: 'POST' }).then(() => loadTimeline()); }
        function doDelete(id) { if (confirm("Löschen?")) fetch(`/delete?id=${id}`, { method: 'POST' }).then(() => loadTimeline()); }

        window.onload = loadTimeline;
    </script>
</body>
</html>
