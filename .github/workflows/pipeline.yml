name: VoteIT Java CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Java JDK 17 einrichten
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'corretto'

    - name: User-Service kompilieren
      working-directory: ./user-service
      run: javac UserService.java

    - name: VoteIT-Service kompilieren
      working-directory: ./voteit-service
      run: javac *.java

    - name: Automatisierte Unit-Tests ausführen
      working-directory: ./voteit-service
      run: java PostServiceTest

    - name: Artefakt vorbereiten
      run: |
        mkdir release
        cp -r user-service release/
        cp -r voteit-service release/
        cp docker-compose.yml release/
        cp README.md release/

    - name: Artefakt hochladen
      uses: actions/upload-artifact@v4
      with:
        name: VoteIT-App
        path: release/

  deliver:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write

    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Bei GitHub Container Registry anmelden
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Docker Image user-service bauen und pushen
      uses: docker/build-push-action@v5
      with:
        context: ./user-service
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/voteit-user-service:latest

    - name: Docker Image voteit-service bauen und pushen
      uses: docker/build-push-action@v5
      with:
        context: ./voteit-service
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/voteit-app:latest